server:
  port: 8080

app:
  image:
    max-bytes: 104857600
    max-total-bytes-per-request: 524288000
    max-items-per-request: 20
    render-dpi: 300
    max-raster-pixels: 40000000
    http-max-attempts: 3
    retry-delay-ms: 500
    max-retry-delay-ms: 8000
    max-input-raster-pixels: 200000000
    temp-dir: data/tmp/images
  pdf:
    output-dir: data/output
    sheet-width-inch: 22
    bottom-padding-inch: 0.25

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

app:
  image:
    max-bytes: ${APP_IMAGE_MAX_BYTES:1073741824}
    max-total-bytes-per-request: ${APP_IMAGE_MAX_TOTAL_BYTES_PER_REQUEST:5368709120}
    max-items-per-request: ${APP_IMAGE_MAX_ITEMS_PER_REQUEST:50}
    render-dpi: ${APP_IMAGE_RENDER_DPI:300}
    max-raster-pixels: ${APP_IMAGE_MAX_RASTER_PIXELS:40000000}
    http-max-attempts: ${APP_IMAGE_HTTP_MAX_ATTEMPTS:3}
    retry-delay-ms: ${APP_IMAGE_RETRY_DELAY_MS:500}
    max-retry-delay-ms: ${APP_IMAGE_MAX_RETRY_DELAY_MS:8000}
    max-input-raster-pixels: ${APP_IMAGE_MAX_INPUT_RASTER_PIXELS:200000000}
    temp-dir: ${APP_IMAGE_TEMP_DIR:data/tmp/images}
    max-item-size-inch: ${APP_IMAGE_MAX_ITEM_SIZE_INCH:120}
    max-position-inch: ${APP_IMAGE_MAX_POSITION_INCH:10000}
    warning-dpi: ${APP_IMAGE_WARNING_DPI:150}
    user-agent: ${APP_IMAGE_USER_AGENT:DtfGangsheet/1.0 (+https://flashship.com)}
    ffmpeg-path: ${APP_IMAGE_FFMPEG_PATH:C:/Users/Admin/AppData/Local/Microsoft/WinGet/Packages/Gyan.FFmpeg.Essentials_Microsoft.Winget.Source_8wekyb3d8bbwe/ffmpeg-8.1.1-essentials_build/bin/ffmpeg.exe}
    ffprobe-path: ${APP_IMAGE_FFPROBE_PATH:C:/Users/Admin/AppData/Local/Microsoft/WinGet/Packages/Gyan.FFmpeg.Essentials_Microsoft.Winget.Source_8wekyb3d8bbwe/ffmpeg-8.1.1-essentials_build/bin/ffprobe.exe}
  pdf:
    output-dir: ${APP_PDF_OUTPUT_DIR:data/output}
    sheet-width-inch: ${APP_PDF_SHEET_WIDTH_INCH:22}
    right-padding-inch: ${APP_PDF_RIGHT_PADDING_INCH:5}
    bottom-padding-inch: ${APP_PDF_BOTTOM_PADDING_INCH:0.25}
    item-gap-inch: ${APP_PDF_ITEM_GAP_INCH:0.1}


logging:
  level:
    com.example.dtfgangsheet: DEBUG
    root: INFO
